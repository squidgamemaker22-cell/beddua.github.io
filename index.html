<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEDDUA | Official Clan Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000;
            --bg: #050505;
            --surface: #0f0f0f;
            --text: #ffffff;
            --border: rgba(255, 0, 0, 0.15);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        /* --- ÜST MENÜ (NAVBAR) --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(5, 5, 5, 0.95);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        nav .links {
            display: flex;
            gap: 40px;
        }

        nav a {
            text-decoration: none;
            color: #888;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* --- ANA BÖLÜM (HERO) --- */
        .hero {
            padding: 100px 8%;
            display: flex;
            gap: 50px;
            align-items: flex-start;
            min-height: 80vh;
        }

        .hero-content {
            flex: 1;
            padding-top: 40px;
        }

        .hero-content h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 5rem;
            margin: 0;
            line-height: 0.9;
            text-transform: uppercase;
        }

        .hero-content h1 span {
            color: var(--primary);
            display: block;
        }

        .hero-content p {
            font-size: 1.2rem;
            color: #666;
            max-width: 500px;
            margin: 30px 0;
        }

        /* --- DISCORD PANELİ (SAĞ TARAF) --- */
        .sidebar {
            width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .discord-header {
            padding: 15px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #444;
            display: flex;
            justify-content: space-between;
        }

        /* --- BUTONLAR --- */
        .cta-group {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 18px 35px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255,0,0,0.4);
        }

        .btn-outline {
            border: 1px solid #333;
            color: #fff;
        }

        .btn-outline:hover {
            border-color: var(--primary);
            background: rgba(255,0,0,0.05);
        }

        /* Mobil Ayarı */
        @media (max-width: 1100px) {
            .hero { flex-direction: column; text-align: center; align-items: center; }
            .hero-content h1 { font-size: 3.5rem; }
            .cta-group { justify-content: center; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BEDDUA</div>
        <div class="links">
            <a href="#">Ana Sayfa</a>
            <a href="#">Sıralama</a>
            <a href="#">Kurallar</a>
            <a href="#">İletişim</a>
        </div>
        <div>
            <a href="https://discord.gg/DAVET_LINKI" class="btn btn-outline" style="padding: 10px 20px;">KATIL</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>SIKI<span>YÖNETİM</span></h1>
            <p>Arkadaşlık bitti, hiyerarşi başladı. Minecraft'ın en sert topluluğu BEDDUA klanına hoş geldin kurucu.</p>
            
            <div class="cta-group">
                <a href="#" class="btn btn-primary">KLANA BAŞVUR</a>
                <a href="#" class="btn btn-outline">KURALLARI OKU</a>
            </div>
        </div>

        <div class="sidebar">
            <div class="discord-header">
                <span>CANLI SUNUCU DURUMU</span>
                <span style="color: green;">● ONLINE</span>
            </div>
            <iframe src="https://discord.com/widget?id=1457837923561898049&theme=dark" width="100%" height="500" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
        </div>
    </section>

</body>
</html>
