<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEDDUA | Sıkıyönetim</title>
    <style>
        :root {
            --accent: #ff0000;
            --bg: #080808;
            --panel: rgba(20, 20, 20, 0.8);
        }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #1a0505 0%, #080808 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .main-card {
            background: var(--panel);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 24px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            transition: transform 0.3s ease;
        }
        .main-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }
        h1 {
            font-size: 5rem;
            font-weight: 900;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }
        span.red { color: var(--accent); }
        p.tagline {
            font-size: 1.1rem;
            color: #888;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: -10px;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        .discord-box {
            grid-column: span 2;
            background: #000;
            border-radius: 16px;
            padding: 5px;
            border: 1px solid #222;
        }
        .btn-apply {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 40px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3);
        }
        .btn-apply:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>BED<span class="red">DUA</span></h1>
        <p class="tagline">Sıkıyönetim Başladı</p>
        
        <p style="color: #bbb; line-height: 1.6;">Arkadaşlık bitti, hiyerarşi başladı. <br> Minecraft'ın en sert topluluğuna hoş geldin.</p>

        <div class="stats-grid">
            <div class="discord-box">
                <iframe src="https://discord.com/widget?id=1457837923561898049&theme=dark" width="100%" height="400" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
            </div>
        </div>

        <a href="https://discord.gg/davetlinkin" class="btn-apply">KLANA KATIL</a>
    </div>

</body>
</html>
