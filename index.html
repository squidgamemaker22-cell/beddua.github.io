<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEDDUA | Official Clan Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000;
            --bg: #050505;
            --surface: #111111;
            --text: #ffffff;
            --border: rgba(255, 0, 0, 0.2);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 20% 30%, #1a0505 0%, #050505 100%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 1.6rem;
            color: var(--primary);
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        .hero {
            padding: 120px 8%;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 60px;
            min-height: 85vh;
            align-items: center;
        }

        .hero-content h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3rem, 8vw, 5.5rem);
            margin: 0;
            line-height: 0.85;
            text-transform: uppercase;
        }

        .hero-content h1 span { color: var(--primary); display: block; }

        .hero-content p {
            font-size: 1.2rem;
            color: #888;
            max-width: 550px;
            margin: 40px 0;
            border-left: 3px solid var(--primary);
            padding-left: 20px;
        }

        /* --- PROBOT STYLE SIDEBAR --- */
        .status-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .status-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: var(--primary);
        }

        .server-icon {
            width: 100px;
            height: 100px;
            background: #222;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 2px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 2rem;
            color: var(--primary);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin-top: 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
        }

        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: #cc0000; transform: translateY(-3px); }

        @media (max-width: 1000px) {
            .hero { grid-template-columns: 1fr; text-align: center; }
            .hero-content p { border-left: none; padding-left: 0; margin: 30px auto; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BEDDUA</div>
        <div class="links" style="display: flex; gap: 30px;">
            <a href="#" style="color: #666; text-decoration: none; font-weight: 700;">KURALLAR</a>
            <a href="#" style="color: #666; text-decoration: none; font-weight: 700;">SIRALAMA</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>SIKI<span>YÖNETİM</span></h1>
            <p>Arkadaşlık bitti, hiyerarşi başladı. Minecraft'ın en sert topluluğu BEDDUA klanına hoş geldin kurucu. ProBot koruması devrede.</p>
            <div style="display: flex; gap: 20px;">
                <a href="https://discord.gg/pUyKMKUM" target="_blank" class="btn btn-primary" style="width: auto; padding: 20px 50px;">KLANA KATIL</a>
            </div>
        </div>

        <div class="status-card">
            <div class="server-icon">B</div>
            <h2 style="margin: 0; font-family: 'Syncopate'; font-size: 1.2rem;">BEDDUA SUNUCUSU</h2>
            <p style="color: #555; font-size: 0.8rem; letter-spacing: 2px;">LIVE ON DISCORD</p>
            
            <div class="stat-row">
                <span>SUNUCU DURUMU</span>
                <span style="color: #2ecc71; font-weight: 900;">AKTİF</span>
            </div>
            <div class="stat-row">
                <span>BOT KORUMASI</span>
                <span style="color: var(--primary); font-weight: 900;">PROBOT</span>
            </div>
            <div class="stat-row">
                <span>KLAN ÜYELERİ</span>
                <span>YÜKLENİYOR...</span>
            </div>

            <a href="https://discord.gg/pUyKMKUM" target="_blank" class="btn btn-primary">DISCORD'A GİT</a>
        </div>
    </section>

</body>
</html>
