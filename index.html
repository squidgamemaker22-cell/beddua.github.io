<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEDDUA | Official Clan Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000;
            --bg: #050505;
            --surface: #0f0f0f;
            --text: #ffffff;
            --border: rgba(255, 0, 0, 0.2);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 20% 30%, #1a0505 0%, #050505 100%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-family: 'Syncopate', sans-serif; font-weight: 700; color: var(--primary); letter-spacing: 4px; }

        .hero {
            padding: 100px 8%;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 50px;
            align-items: center;
            min-height: 85vh;
        }

        .hero-content h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3rem, 7vw, 5rem);
            margin: 0; line-height: 0.9; text-transform: uppercase;
        }

        .hero-content h1 span { color: var(--primary); display: block; }

        /* --- ÖZEL KLAN PANELİ (DURUM KARTI) --- */
        .clan-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
            position: relative;
        }

        .clan-panel::before {
            content: 'CANLI SUNUCU';
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 4px 15px;
            border-radius: 20px; font-size: 0.7rem; font-weight: 900; letter-spacing: 2px;
        }

        .server-avatar {
            width: 90px; height: 90px; background: #222; border-radius: 20px;
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 900; color: var(--primary); border: 2px solid var(--border);
        }

        .stat-box {
            display: flex; justify-content: space-between; margin: 12px 0;
            padding: 18px; background: rgba(255,255,255,0.03); border-radius: 15px;
        }

        .pulse {
            width: 10px; height: 10px; background: #2ecc71; border-radius: 50%;
            display: inline-block; margin-right: 10px; box-shadow: 0 0 10px #2ecc71;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        .btn-join {
            display: block; width: 100%; padding: 20px; margin-top: 30px;
            background: var(--primary); color: white; text-decoration: none;
            border-radius: 15px; font-weight: 900; text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-join:hover { transform: scale(1.03); box-shadow: 0 0 30px rgba(255,0,0,0.3); }

        @media (max-width: 1000px) { .hero { grid-template-columns: 1fr; text-align: center; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BEDDUA</div>
        <div style="display: flex; gap: 25px;">
            <a href="#" style="color: #666; text-decoration: none; font-weight: 800;">KURALLAR</a>
            <a href="https://discord.gg/pUyKMKUM" target="_blank" style="color: var(--primary); text-decoration: none; font-weight: 800;">KATIL</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>SIKI<span>YÖNETİM</span></h1>
            <p style="color: #666; font-size: 1.2rem; margin: 30px 0;">Minecraft'ın en disiplinli klanına hoş geldin. BEDDUA sadece bir klan değil, bir hiyerarşidir. ProBot ile 7/24 aktif koruma.</p>
            <a href="https://discord.gg/pUyKMKUM" target="_blank" class="btn-join" style="width: fit-content; padding: 20px 60px;">KLANA BAŞVUR</a>
        </div>

        <div class="clan-panel">
            <div class="server-avatar">B</div>
            <h2 style="margin: 5px 0; font-family: 'Syncopate'; font-size: 1.1rem;">BEDDUA CLAN</h2>
            <p style="color: #444; font-size: 0.8rem; margin-bottom: 25px;">SERVER ID: 1457837923561898049</p>
            
            <div class="stat-box">
                <span>DURUM</span>
                <span style="color: #2ecc71; font-weight: 900;"><span class="pulse"></span>AKTİF</span>
            </div>
            <div class="stat-box">
                <span>KORUMA</span>
                <span style="color: var(--primary); font-weight: 900;">PROBOT</span>
            </div>
            <div class="stat-box">
                <span>GÜNCEL ÜYE</span>
                <span style="font-weight: 900;">CANLI</span>
            </div>

            <a href="https://discord.gg/pUyKMKUM" target="_blank" class="btn-join">DISCORD'A GİT</a>
        </div>
    </section>

</body>
</html>
